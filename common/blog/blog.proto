syntax = "proto3";

// import "google/protobuf/empty.proto";

option go_package = "hcorreia/live-blog/blog";

package blog;

service BlogService {
    rpc ListPosts(ListParams) returns (PostListResponse);
    rpc GetPost(IdParam) returns (PostResponse);
    rpc CreatePost(PostCreateRequest) returns (PostResponse);
    rpc UpdatePost(PostUpdateRequest) returns (PostResponse);
    rpc DeletePost(IdParam) returns (Empty);
}

message Empty {
    int32 page = 1;
}

message ListParams {
    int32 page = 1;
}

message IdParam {
    int32 id = 1;
}

message PostResponse {
    int32 ID = 1;
    string Title = 2;
    string Image = 3;
    string Content = 4;
    string CreatedAt = 5;
    string UpdatedAt = 6;
}

message PostCreateRequest {
    string Title = 1;
    string Image = 2;
    string Content = 3;
}

message PostUpdateRequest {
    int32 ID = 1;
    string Title = 2;
    string Image = 3;
    string Content = 4;
}

message PostListResponse {
    repeated PostResponse posts = 1;
}


